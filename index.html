    <script>
      // Handle SPA redirect from 404.html (GitHub Pages)
      (function() {
        var l = window.location;
        if (l.search[1] === 'p' && l.search[2] === '=') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&');
          });
          var path = decoded[0].slice(2).replace(/~and~/g, '&');
          var query = decoded[1] ? ('?' + decoded[1].slice(2).replace(/~and~/g, '&')) : '';
          history.replaceState(null, null, path + query + (l.hash || ''));
        }
      })();
    </script>
